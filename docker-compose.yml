services:
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms_password
      POSTGRES_DB: wms
    ports:
      - '5432:5432'
    volumes:
      - wms-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wms -d wms']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wms:wms_password@postgres:5432/wms?schema=public
      JWT_SECRET: change_me_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: wms-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:80'

volumes:
  wms-pg-data:
